<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="Brazoria Civic Watch Homepage" />
        <meta property="og:image" content="icons/BrazoriaCivicWatchLinkPreview.png" />
        <meta name="thumbnail" content="icons/BrazoriaCivicWatchLinkPreview.png" />
        
        <title>Brazoria Civic Watch</title>

        <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">
        <link rel="stylesheet" href="styles/card-wheel.css">
        <link rel="stylesheet" href="styles/content.css">
        <link rel="stylesheet" href="styles/general.css">
        <link rel="stylesheet" href="styles/header.css">
        <link rel="stylesheet" href="styles/voter-cards.css">
        <link rel="stylesheet" href="styles/footer.css">
        <link rel="stylesheet" href="styles/election-countdown.css">
        <link rel="stylesheet" href="styles/sidebar.css">
        <link rel="stylesheet" href="styles/summary-page.css">
        <link rel="stylesheet" href="styles/archive.css">

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    </head>
    <body>
        <div class="header js-header"></div>
        
        <div class="sidebar-container js-sidebar-container"></div>
        
        <div class="title">
            <picture>
                <source srcset="icons/BrazoriaCivicWatchDarkModeFinal.png" media="(prefers-color-scheme: dark)">
                <img class="title-graphic" src="icons/Brazoria Civic Watch Final.png" alt="Brazoria Civic Watch Logo">
            </picture>
        </div>

        <div class="carousel-container">
            <button class="carousel-arrow prev-arrow js-hands-off" id="prevBtn">&#10094;</button>

            <div class="carousel-view">
                <div class="card-wheel" id="cardWheel">
                    <div data-target="webpages/meeting-selection-screen.html" class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/recent-meeting.png.jpg" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Recent Meetings
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/run-for-office.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Run for Office
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/candidate-interviews.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Candidate Interviews
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/officials-info.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Current Officials
                            </div>
                        </div>
                    </div>
                    <div data-target="webpages/archive.html" class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/archive.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Archive
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/locations-info.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Meeting Information
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/gov-websites.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Government Websites
                            </div>
                        </div>
                    </div>
                    <div class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/register-to-vote.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Register to Vote
                            </div>
                        </div>
                    </div>
                    <div data-target="webpages/public-places.html" class="card-container js-div-button">
                        <img class="card-photo" src="card-photos/public-place-locations.png" draggable="false">
                        <div class="card-overlay">
                            <div class="card-text">
                                Public Places
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="carousel-arrow next-arrow js-hands-off" id="nextBtn">&#10095;</button>
        </div>

        <div class="separator-container"> 
          <div class="seperator">
            
          </div>
        </div>

        <div class="election-timer-container">
            <p class="election-countdown-text-notifier" >Time till next election</p>
            <div class="election-countdown js-election-countdown">
                <p>1d: 11h: 43m: 12s</p>
            </div>
        </div>

        <div class="voter-cards-set">
          <p class="voter-cards-title">Voter Information</p>
          <div class="voter-buttons-container">
            <div class="voter-card">
              <button class="voter-button">
                <p>Candidate Interviews</p>
              </button>
            </div>
            <div class="voter-card">
              <button class="voter-button">
                <p>Voter Information (When and Where)</p>
              </button>
            </div>
            <div class="voter-card">
              <button class="voter-button">
                <p>Sample Ballot</p>
              </button>
            </div>
          </div>
        </div>

        <div class="separator-container"> 
          <div class="seperator">
            
          </div>
        </div>

        <div class="footer js-footer"></div>

        <!--External Libraries-->
        <script src="importedJS/turf.min.js" defer></script>

        <!--Data-->
        <script type="module" src="scripts/utils/fixNoun.js"></script>
        <script type="module" src="scripts/utils/fixDate.js"></script>
        <script type="module" src="scripts/locationStore.js"></script>
        <script type="module" src="data/summaries.js"></script>

        <!--Globals-->
        <script type="module" src="scripts/globalHTMLGenerate.js"></script>
        <script type="module" src="scripts/globalButtons.js"></script>
        <script type="module" src="scripts/globalArchive.js"></script>
        <script type="module" src="scripts/globalSummaries.js"></script>

        <!--Personal-->
        <script type="module" src="scripts/home.js"></script>
    </body>
</html>
