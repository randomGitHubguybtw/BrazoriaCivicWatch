<!DOCTYPE html>
<html>

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <meta property="og:title" content="Brazoria Civic Watch Homepage" />
        <meta property="og:image" content="icons/BrazoriaCivicWatchLinkPreview.png" />
        <metaa name="thumbnail" content="icons/BrazoriaCivicWatchLinkPreview.png" />

        <title>Brazoria Civic Watch</title>

        <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">

    </head>
    <body>

        <div class="header js-header"></div>

        <div class="sidebar-container js-sidebar-container"></div>

        <div class="title">
            <picture>
                <source srcset="icons/BrazoriaCivicWatchDarkModeFinal.png" media="(prefers-color-scheme: dark)">
                <img class="title-graphic" src="icons/Brazoria Civic Watch Final.png" alt="Brazoria Civic Watch Logo">
            </picture>
        </div>

        <div class="card-wheel">
            <div data-target="webpages/meeting-selection-screen.html" class="card-container js-div-button">
                <img class="card-photo" src="card-photos/recent-meeting.png.jpg">
                <div class="card-overlay">
                    <div class="card-text">
                        Recent Meetings
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/run-for-office.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Run for Office
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/candidate-interviews.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Candidate Interviews
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/officials-info.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Current Officials
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/archive.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Archive
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/locations-info.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Meeting Information
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/gov-websites.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Government Websites
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/register-to-vote.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Register to Vote
                    </div>
                </div>
            </div>
            <div class="card-container js-div-button">
                <img class="card-photo" src="card-photos/public-place-locations.png">
                <div class="card-overlay">
                    <div class="card-text">
                        Public Places
                    </div>
                </div>
            </div>
        </div>

        <div class="separator-container">
          <div class="seperator">
            
          </div>
        </div>

        <div class="voter-cards-set">
          <p class="voter-cards-title">Voter Information</p>
          <div class="voter-buttons-container">
            <div class="voter-card">
              <button class="voter-button">
                <p>Candidate Interviews</p>
              </button>
            </div>
            <div class="voter-card">
              <button class="voter-button">
                <p>Voter Information (When and Where)</p>
              </button>
            </div>
            <div class="voter-card">
              <button class="voter-button">
                <p>Sample Ballot</p>
              </button>
            </div>
          </div>
        </div>

        <div class="election-timer-container">
            <p class="election-countdown-text-notifier" >Time till next election</p>
            <div class="election-countdown js-election-countdown">
                <p>1d: 11h: 43m: 12s</p>
            </div>
        </div>

        <div class="footer js-footer"></div>


        <!--External Libraries-->
        <script src="importedJS/turf.min.js" defer></script>

        <!--Data-->
        <script type="module" src="scripts/utils/fixNoun.js"></script>
        <script type="module" src="scripts/locationStore.js"></script>
        <script type="module" src="data/summaries.js"></script>

        <!--Globals-->
        <script type="module" src="scripts/globalHTMLGenerate.js"></script>
        <script type="module" src="scripts/globalButtons.js"></script>
        <script type="module" src="scripts/globalSummaries.js"></script>


        <!--Page-Specific-->
        <script type="module" src="scripts/home.js"></script>

    </body>

</html>
