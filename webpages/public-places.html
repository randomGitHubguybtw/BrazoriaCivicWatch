<!DOCTYPE html>
<html>

  <head>
    <base href="../../">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Public Places</title>
    <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">

  </head>

<body>

    <div class="header js-header"></div>

    <div class="sidebar-container js-sidebar-container"></div>

    <div class="title">
      <picture>
          <source srcset="icons/PublicLocationsTitleDarkMode.png" media="(prefers-color-scheme: dark)">
          <img style="object-position: 45% 55%; height: 225px; margin-top: 10px;" class="title-graphic" src="icons/PublicLocationsTitle.png" alt="Brazoria Civic Watch Logo">
      </picture>
    </div>

    <div class="place-search-wrapper">
      <input type="text" id="placeSearchInput" class="place-search-input" placeholder="Search locations, addresses, or types...">
    </div>

    <div id="places-container" class="places-container"></div>

    <div class="disclaimer-text-container">
      <p class="disclaimer-text">Is a location wrong or missing? <a class="default-link" href="https://forms.gle/4sEn3ooneF7AyH4C7" target="_blank">Report a concern!</a> We are also <a class="default-link" href="https://forms.gle/oTUAUNgc3TBwZozB6" target="_blank">always looking for volunteers</a> to double check and proofread our data!</p>
    </div>
    
  <div class="footer js-footer"></div>

  <script src="importedJS/turf.min.js" defer></script>

  <script type="module" src="scripts/utils/fixNoun.js"></script>
  <script type="module" src="scripts/utils/fixDate.js"></script>
  <script type="module" src="scripts/locationStore.js"></script>

  <script type="module" src="scripts/globalHTMLGenerate.js"></script>
  <script type="module" src="scripts/globalButtons.js"></script>
  <script type="module" src="scripts/globalArchive.js"></script>
  <script type="module" src="scripts/publicLocations.js"></script>

</body>

</html>
