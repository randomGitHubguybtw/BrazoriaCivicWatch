<!DOCTYPE html>
<html>

  <head>
    <base href="../">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Financial Integrity</title>
    <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">

  </head>

<body>

    <div class="header js-header"></div>

    <div class="sidebar-container js-sidebar-container"></div>

    <div class="title">
      <picture>
          <source srcset="icons/FinanceCivicWatchTitleDark.png" media="(prefers-color-scheme: dark)">
          <img style="object-position: 45% 55%; height: 225px; margin-top: 10px;" class="title-graphic" src="icons/FinanceCivicWatchTitle.png" alt="Brazoria Civic Watch Logo">
      </picture>
    </div>

    <div class="finance-button-container">
      <button data-target="webpages/pledge.html" class="voter-button finance-button integrity-button integrity-button-pledge">Our Financial Pledge</button>
    </div>

    <div class="finance-button-container">
      <button data-target="webpages/wall-of-shame.html" class="voter-button finance-button integrity-button integrity-button-wall-of-shame">Donor Wall of Shame</button>
    </div>

    <div class="finance-button-container">
      <button class="js-donate-button js-hands-off voter-button finance-button integrity-button integrity-button-donate">Donate!</button>
    </div>
    
    <div class="donation-chart-container">
      <h2 class="donation-chart-title">Donation Breakdown</h2>
      <div class="bar-chart" id="donationBarChart"></div>
    </div>

  <div class="footer js-footer"></div>

  <script src="importedJS/turf.min.js" defer></script>

  <script type="module" src="scripts/utils/fixNoun.js"></script>
  <script type="module" src="scripts/utils/fixDate.js"></script>
  <script type="module" src="scripts/locationStore.js"></script>

  <script type="module" src="scripts/globalHTMLGenerate.js"></script>
  <script type="module" src="scripts/globalButtons.js"></script>
  <script type="module" src="scripts/globalArchive.js"></script>
  <script type="module" src="scripts/donations.js"></script>

</body>

</html>
