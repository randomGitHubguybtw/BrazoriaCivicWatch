<!DOCTYPE html>
<html>

  <head>
    <base href="../">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Welcome volunteer!</title>

    <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">

  </head>

</head>
<body>

    <div class="header js-header"></div>

    <div class="sidebar-container js-sidebar-container"></div>

    <div class="volunteer-buttons js-volunteer-buttons">
      <button class="js-hands-off action-button" onclick="window.location.href = 'webpages/volunteer-portal.html'">Add summary</button>
      <button class="js-hands-off action-button" onclick="window.location.href = 'webpages/election-volunteer-portal.html'">Add election</button>
    </div>

    <div class="footer js-footer"></div>

  <script>

    const urlParams = new URLSearchParams(window.location.search);
    const isSummarizer = urlParams.get('summarizer') === 'true';
    const isElectionSeeker = urlParams.get('election_seeker') === 'true';
    const isSeatTracker = urlParams.get('seat_tracker') === 'true';

    const buttons = document.querySelector('.js-volunteer-buttons');
    let HTML = '';

    if (isSummarizer) {
      HTML += `<button class="js-hands-off action-button volunteer-button" onclick="window.location.href = 'webpages/volunteer-portal.html'">Add summary</button>`
    }
    if (isElectionSeeker) {
      HTML += `<button class="js-hands-off action-button volunteer-button" onclick="window.location.href = 'webpages/election-volunteer-portal.html'">Add election</button>`
    }
    if (isSeatTracker) {
      HTML += `<button class="js-hands-off action-button volunteer-button" onclick="window.location.href = 'webpages/officials-volunteer-portal.html'">Add a sitting official</button>`
    }

    buttons.innerHTML = HTML;
    
  </script>

  <!--External Libraries-->
  <script src="importedJS/turf.min.js" defer></script>

  <!--Data-->
  <script type="module" src="scripts/utils/fixNoun.js"></script>
  <script type="module" src="scripts/utils/fixDate.js"></script>
  <script type="module" src="scripts/locationStore.js"></script>

  <!--Globals-->
  <script type="module" src="scripts/globalHTMLGenerate.js"></script>
  <script type="module" src="scripts/globalButtons.js"></script>
  <script type="module" src="scripts/globalArchive.js"></script>

</body>

</html>
