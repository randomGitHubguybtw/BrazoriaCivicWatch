<!DOCTYPE html>
<html lang="en">
<head>
    <base href="../">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="icons/Brazoria Civic Watch Logo Black.png">
    <title>Volunteer Login</title>
</head>
<body>
    <div class="header js-header"></div>

    <div class="sidebar-container js-sidebar-container"></div>

    <a href="index.html" class="default-link login-home-link">← Back to Homepage</a>

    <div class="separator-container"> 
          <div class="seperator">
            
          </div>
        </div>

    <h1 style="text-align: center;">Volunteer <a href="https://forms.gle/wA53jinSotYd6MFs9" target="_blank" class="default-link">Here!</a></h1>

    <div class="separator-container"> 
          <div class="seperator">
            
          </div>
        </div>

    <p style="text-align: center; margin-bottom: 50px;">Already a volunteer? Login!</p>


    <div class="login-info">
    <h2>System Login</h2>

    <label class="info-text">Email:</label><br>
    <input type="email" id="emailInput" class="email-input"><br><br>

    <label class="info-text">Password:</label><br>
    <input type="password" id="passwordInput" class="password-input"><br><br>

    <button id="loginBtn" class="js-hands-off login-button">Log In</button>
    </div>

    <div class="footer js-footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        import { masterVolunteers } from "../data/volunteers.js";

        const supabaseUrl = 'https://wytipsmhzgrtxhpojvjt.supabase.co';
        const supabaseKey = 'sb_publishable_95Eiuz84ZNZxm83jTGrF-Q_GS6uViKk';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                alert("Please enter both email and password.");
                return;
            }

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Error logging in: " + error.message);
            } else {
                let data = '?';
                let foundInDatabase = false;

                masterVolunteers.forEach( volunteer => {
                    if (volunteer.email.toLowerCase() === email.toLowerCase()) {
                        foundInDatabase = true;
                        
                        if (volunteer.role.includes('summarizer')) {
                            data += 'summarizer=true&';
                        } 
                        if (volunteer.role.includes('election_seeker')) {
                            data += 'election_seeker=true&';
                        }
                        if (volunteer.role.includes('seat_tracker')) {
                            data += 'seat_tracker=true&';
                        }
                        window.location.href = "webpages/choose.html" + data;
                    }
                });

                if (!foundInDatabase) {
                    alert("Login successful with Supabase, but your email was not found in the Volunteer Database. Please contact the administrator.");
                    await supabase.auth.signOut();
                }
            }
        });

        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>

    <!--External Libraries-->
    <script src="importedJS/turf.min.js" defer></script>

    <!--Data-->
    <script type="module" src="scripts/utils/fixNoun.js"></script>
    <script type="module" src="scripts/utils/fixDate.js"></script>
    <script type="module" src="scripts/locationStore.js"></script>
    <script type="module" src="data/volunteers.js"></script>

    <!--Globals-->
    <script type="module" src="scripts/globalHTMLGenerate.js"></script>
    <script type="module" src="scripts/globalButtons.js"></script>
    <script type="module" src="scripts/globalArchive.js"></script>
</body>
