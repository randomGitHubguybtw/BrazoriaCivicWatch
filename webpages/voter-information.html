<!DOCTYPE html>
<html>

  <head>
    <base href="../../">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  </head>

</head>
<body>

    <div class="header js-header"></div>

    <div class="sidebar-container js-sidebar-container"></div>

    <div class="title">

          <img style="object-position: 45% 55%; height: 225px; margin-top: 10px;" class="title-graphic" src="icons/VoterInformationTitle.png" alt="Brazoria Civic Watch Logo">

          <p>Sample Ballot</p>

  <script type="module" src="scripts/globalButtons.js"></script>
