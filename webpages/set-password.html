<!DOCTYPE html>
<html lang="en">
<head>
    <base href="../../">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password</title>
    <link rel="stylesheet" href="styles/password-set.css">
</head>
<body>
    <div id="mainContainer" class="meeting-form">
        <h1 class="section-heading">Account Setup</h1>
        
        <label class="form-label">Set Email:</label>
        <input type="email" id="emailInput" class="form-input">
        
        <label class="form-label">Set Password:</label>
        <div class="password-wrapper">
            <input type="password" id="passwordInput" class="form-input">
            <button type="button" id="showPasswordBtn" class="edit-button">Show</button>
        </div>
        
        <div class="button-container">
            <button type="button" id="submitBtn" class="action-button">Save Password</button>
        </div>
        
        <p class="disclaimer-text">Disclaimer: This page can only be accessed once to set your initial password.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="scripts/passwordSetup.js"></script>
</body>
</html>
